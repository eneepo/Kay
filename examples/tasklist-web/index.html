<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task list — Kay lab</title>
  <style>
    body { font: 16px/1.5 system-ui, sans-serif; max-width: 32rem; margin: 3rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    form { display: flex; gap: .5rem; margin-bottom: 1rem; }
    input { flex: 1; padding: .5rem; }
    button { padding: .5rem .8rem; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; gap: .5rem; padding: .4rem 0; border-bottom: 1px solid #eee; }
    li.done label { text-decoration: line-through; color: #999; }
    .empty { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <h1>Task list</h1>
  <form id="add-form">
    <input id="task-input" placeholder="Add a task…" autocomplete="off" />
    <button type="submit">Add</button>
  </form>
  <ul id="task-list"></ul>
  <p id="empty" class="empty">No tasks yet.</p>
  <script src="app.js"></script>
</body>
</html>
